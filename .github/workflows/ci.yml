name: CI

on:
  push:
  pull_request:

jobs:
  arduino-compile:
    name: Compile Arduino sketch (ESP32)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - name: Adafruit SSD1306
            - name: Adafruit GFX Library
            - name: Adafruit BusIO
          sketch-paths: |
            - sketch_jun2a

  python-lint:
    name: Lint Python client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff -r requirements.txt

      - name: Lint with ruff
        run: ruff check main.py

      - name: Syntax check
        run: python -m py_compile main.py
